<div class="bg-dark-card border border-dark-border rounded-2xl overflow-hidden card-hover group relative">
  <a href="{% url 'template_detail' t.pk %}">
    <div class="relative aspect-[9/16] bg-dark-border overflow-hidden">
      {% if t.thumbnail %}
        <img src="{{ t.thumbnail.url }}" alt="{{ t.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
      {% elif t.file_type == 'image' %}
        <img src="{{ t.file.url }}" alt="{{ t.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
      {% else %}
        <div class="w-full h-full flex items-center justify-center bg-dark-border">
          <span class="text-4xl">🎬</span>
        </div>
      {% endif %}
      {% if t.file_type == 'video' %}
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-10 h-10 bg-black/60 rounded-full flex items-center justify-center">
          <span class="text-white text-lg ml-1">▶</span>
        </div>
      </div>
      {% endif %}
      {% if t.is_free %}
      <div class="absolute bottom-2 left-2 bg-brand text-black text-xs font-bold px-2 py-0.5 rounded-full">Free</div>
      {% else %}
      <div class="absolute bottom-2 left-2 bg-yellow-500 text-black text-xs font-bold px-2 py-0.5 rounded-full">Pro</div>
      {% endif %}
      {% if t.is_featured %}<div class="absolute top-2 left-2 bg-purple-600 text-white text-xs px-2 py-0.5 rounded-full">⭐ Featured</div>{% endif %}
    </div>
  </a>
  <div class="p-3">
    <h3 class="text-sm font-semibold text-white truncate">{{ t.title }}</h3>
    <div class="flex items-center justify-between mt-1">
      <span class="text-xs text-gray-500">by {{ t.creator.username }}</span>
      <div class="flex items-center gap-2 text-xs text-gray-500">
        <span>♥ {{ t.likes_count }}</span>
      </div>
    </div>
  </div>
</div>
